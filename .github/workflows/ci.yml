name: CI - Cliente System

permissions:
  contents: read

on:
  push:
    branches:
      - dev
      - 'feature/**'
      - 'feat/**'
      - 'fix/**'
      - 'hotfix/**'
      - 'release/**'

    paths:
      - 'cliente-system/**'
      - '.github/workflows/**'

  pull_request:
    branches:
      - dev

    paths:
      - 'cliente-system/**'
      - '.github/workflows/**'

concurrency:
  group: cliente-system-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: '8'
  JAVA_DISTRIBUTION: 'temurin'
  MAVEN_OPTS: "-Xmx1024m"
  PROJECT_DIR: cliente-system
  WAR_FILE: cliente-system.war
  WAR_PATH: cliente-system/target/cliente-system.war

jobs:

  ###########################################################################
  # 1. VALIDACAO RAPIDA
  ###########################################################################
  validate:
    name: "Validacao Inicial"
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Validar estrutura do projeto
        run: |
          test -f $PROJECT_DIR/pom.xml
          test -d $PROJECT_DIR/src
          echo "Estrutura Maven OK"

      - name: Validar Docker Compose
        working-directory: ${{ env.PROJECT_DIR }}/docker
        run: docker compose config

  ###########################################################################
  # 2. LINT / ANALISE ESTATICA
  ###########################################################################
  lint:
    name: "Lint (Checkstyle � PMD � SpotBugs)"
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: validate

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Exibir versoes
        run: |
          java -version
          mvn -version

      - name: Checkstyle
        working-directory: ${{ env.PROJECT_DIR }}
        run: mvn -B checkstyle:check

      - name: PMD
        working-directory: ${{ env.PROJECT_DIR }}
        run: mvn -B pmd:check

      - name: SpotBugs
        working-directory: ${{ env.PROJECT_DIR }}
        run: mvn -B spotbugs:check

      - name: Upload SpotBugs Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: spotbugs-report
          path: |
            cliente-system/target/spotbugsXml.xml
            cliente-system/target/site/
          retention-days: 5

  ###########################################################################
  # 3. TESTES UNITARIOS
  ###########################################################################
  test:
    name: "Testes Unitarios"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Executar testes unitarios
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          mvn \
            -B \
            clean \
            test \
            jacoco:report

      - name: Publicar relatorios Surefire
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: cliente-system/target/surefire-reports/
          retention-days: 7

      - name: Publicar cobertura JaCoCo
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: cliente-system/target/site/jacoco/
          retention-days: 7

      - name: Resumo dos testes
        if: always()
        run: |
          echo "## Resultado dos Testes Unitarios" >> $GITHUB_STEP_SUMMARY

          REPORT_DIR="cliente-system/target/surefire-reports"

          if ls "$REPORT_DIR"/TEST-*.xml 1>/dev/null 2>&1; then

            TOTAL=$(grep -h 'tests=' "$REPORT_DIR"/TEST-*.xml \
              | grep -oP 'tests="\K[0-9]+' \
              | paste -sd+ \
              | bc)

            FAILURES=$(grep -h 'failures=' "$REPORT_DIR"/TEST-*.xml \
              | grep -oP 'failures="\K[0-9]+' \
              | paste -sd+ \
              | bc)

            ERRORS=$(grep -h 'errors=' "$REPORT_DIR"/TEST-*.xml \
              | grep -oP 'errors="\K[0-9]+' \
              | paste -sd+ \
              | bc)

            echo "| Total | Falhas | Errors |" >> $GITHUB_STEP_SUMMARY
            echo "|-------|---------|--------|" >> $GITHUB_STEP_SUMMARY
            echo "| $TOTAL | $FAILURES | $ERRORS |" >> $GITHUB_STEP_SUMMARY

          else
            echo "Nenhum relatorio encontrado." >> $GITHUB_STEP_SUMMARY
          fi

  ###########################################################################
  # 4. BUILD
  ###########################################################################
  build:
    name: "Build WAR"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: test

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Gerar WAR
        working-directory: ${{ env.PROJECT_DIR }}
        run: |
          mvn \
            -B \
            clean \
            package \
            -DskipTests

      - name: Validar artefato
        run: |
          test -f $WAR_PATH

          echo "## Artefato Gerado" >> $GITHUB_STEP_SUMMARY

          SIZE=$(du -sh $WAR_PATH | cut -f1)

          echo "| Arquivo | Tamanho |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|----------|" >> $GITHUB_STEP_SUMMARY
          echo "| $WAR_FILE | $SIZE |" >> $GITHUB_STEP_SUMMARY

      - name: Upload WAR
        uses: actions/upload-artifact@v4
        with:
          name: cliente-system-war
          path: ${{ env.WAR_PATH }}
          retention-days: 3

  ###########################################################################
  # 5. E2E
  ###########################################################################
  e2e:
    name: "E2E (WildFly + PostgreSQL + Selenium)"
    runs-on: ubuntu-latest
    timeout-minutes: 35
    needs: build

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.JAVA_DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Verificar Docker
        run: |
          docker --version
          docker compose version

      - name: Verificar navegador
        run: |
          google-chrome --version || true
          chromium-browser --version || true

      - name: Download WAR
        uses: actions/download-artifact@v4
        with:
          name: cliente-system-war
          path: cliente-system/target/

      - name: Confirmar WAR
        run: |
          ls -lh cliente-system/target/
          test -f cliente-system/target/cliente-system.war

      - name: Build WildFly
        working-directory: cliente-system/docker
        run: docker compose build wildfly

      - name: Subir PostgreSQL
        working-directory: cliente-system/docker
        run: docker compose up -d postgres

      - name: Esperar PostgreSQL
        run: |
          echo "Aguardando PostgreSQL..."

          timeout 90 bash -c '
            until docker exec postgres_cliente_system \
              pg_isready -U postgres; do
              sleep 3
            done
          '

          echo "PostgreSQL pronto."

      - name: Subir WildFly
        working-directory: cliente-system/docker
        run: docker compose up -d --no-deps wildfly

      - name: Esperar deploy da aplicacao
        run: |
          echo "Aguardando aplicacao..."

          timeout 180 bash -c '
            until curl -sf \
              http://localhost:8080/cliente-system/content/clientes/listarClientes.xhtml \
              -o /dev/null; do
              sleep 5
              echo "Aplicacao ainda nao respondeu..."
            done
          '

          echo "Aplicacao disponivel."

      - name: Executar testes E2E
        working-directory: cliente-system
        env:
          APP_BASE_URL: http://localhost:8080/cliente-system
        run: |
          mvn \
            -B \
            verify \
            -Pe2e \
            -Dsurefire.skip=true

      - name: Upload relatorios E2E
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: |
            cliente-system/target/failsafe-reports/
            cliente-system/target/screenshots/
          retention-days: 5

      - name: Logs containers
        if: failure()
        run: |
          mkdir -p /tmp/container-logs

          docker logs postgres_cliente_system \
            > /tmp/container-logs/postgres.log 2>&1 || true

          docker logs wildfly_cliente_system \
            > /tmp/container-logs/wildfly.log 2>&1 || true

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: container-logs
          path: /tmp/container-logs/
          retention-days: 5

      - name: Estado final containers
        if: always()
        run: docker ps -a

      - name: Derrubar ambiente
        if: always()
        working-directory: cliente-system/docker
        run: docker compose down -v

  ###########################################################################
  # 6. RESUMO FINAL
  ###########################################################################
  pipeline-summary:
    name: "Resumo Pipeline"
    runs-on: ubuntu-latest
    if: always()
    needs:
      - validate
      - lint
      - test
      - build
      - e2e

    steps:
      - name: Resumo final
        run: |
          echo "# Pipeline Finalizada" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Resultado |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Validate | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Lint | ${{ needs.lint.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Test | ${{ needs.test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| E2E | ${{ needs.e2e.result }} |" >> $GITHUB_STEP_SUMMARY