<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <meta charset="UTF-8"/>
    <title><ui:insert name="title">Cliente System</ui:insert></title>
</h:head>

<h:body>
    <div style="background:#2c3e50;padding:12px 24px;color:white;display:flex;align-items:center;justify-content:space-between;">
        <span style="font-size:1.2rem;font-weight:bold;">Cliente System</span>
        <nav>
            <h:link value="Clientes" outcome="/content/clientes/listarClientes"
                    style="color:white;margin-right:16px;text-decoration:none;"/>
            <h:link value="Novo Cliente" outcome="/content/clientes/criarCliente"
                    style="color:white;margin-right:16px;text-decoration:none;"/>
            <h:link value="Produtos" outcome="/content/produtos/listarProdutos"
                    style="color:white;margin-right:16px;text-decoration:none;"/>
            <h:link value="Novo Produto" outcome="/content/produtos/criarProduto"
                    style="color:white;text-decoration:none;"/>
        </nav>
    </div>

    <div style="padding:0 24px;">
        <h:messages globalOnly="true" showDetail="true"
                    infoStyle="color:green;background:#e8f5e9;padding:8px;border-radius:4px;margin-top:8px;display:block;"
                    errorStyle="color:red;background:#ffebee;padding:8px;border-radius:4px;margin-top:8px;display:block;"/>
    </div>

    <div style="padding:24px;">
        <ui:insert name="content"/>
    </div>
</h:body>
</html>
