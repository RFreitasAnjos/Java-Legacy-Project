<ui:composition template="/templates/root/mainLayout.xhtml" xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html" xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets" xmlns:p="http://primefaces.org/ui">

    <ui:define name="title">Clientes - Lista</ui:define>

    <ui:define name="content">

        <h2>Clientes Cadastrados</h2>

        <h:link value="+ Novo Cliente" outcome="/content/clientes/criarCliente" style="
                display:inline-block;
                margin-bottom:16px;
                padding:8px 16px;
                background:#27ae60;
                color:white;
                text-decoration:none;
                border-radius:4px;
            " />

        <h:form id="formLista">

            <p:dataTable value="#{clienteBean.clientes}" var="c">

                <p:column headerText="Nome">
                    #{c.nome}
                </p:column>

                <p:column headerText="Email">
                    #{c.email}
                </p:column>

                <p:column headerText="Acoes">
                    <p:commandButton value="Editar"
                        action="#{clienteBean.prepararEdicao(c)}"
                        process="@this"/>
                    <p:commandButton value="Excluir"
                        process="@this"
                        update=":formLista:dialogExcluir"
                        actionListener="#{clienteBean.prepararRemocao(c)}"
                        oncomplete="PF('dialogExcluir').show()"
                        style="margin-left:6px;"/>
                </p:column>

            </p:dataTable>

            <ui:include src="/components/confirmDialog.xhtml">
                <ui:param name="dialogId" value="dialogExcluir" />
                <ui:param name="titulo" value="Confirmacao de Exclusao" />
                <ui:param name="mensagem" value="Deseja realmente excluir o cliente:" />
                <ui:param name="textoDestaque" value="#{clienteBean.clienteSelecionado.nome}" />
                <ui:param name="action" value="#{clienteBean.confirmarRemocao}" />
                <ui:param name="update" value="formLista" />
            </ui:include>

        </h:form>

    </ui:define>

</ui:composition>
