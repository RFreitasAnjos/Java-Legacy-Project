<ui:composition template="/templates/root/mainLayout.xhtml"
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

    <ui:define name="title">Clientes - Lista</ui:define>

    <ui:define name="content">
        <h2>Clientes Cadastrados</h2>

        <h:link value="+ Novo Cliente" outcome="/content/clientes/criarCliente"
                style="display:inline-block;margin-bottom:16px;padding:8px 16px;background:#27ae60;color:white;text-decoration:none;border-radius:4px;"/>

        <h:dataTable value="#{clienteBean.clientes}" var="c"
                     rendered="#{not empty clienteBean.clientes}"
                     border="1" cellpadding="6"
                     style="width:100%;border-collapse:collapse;">
            <h:column>
                <f:facet name="header">ID</f:facet>
                #{c.id}
            </h:column>
            <h:column>
                <f:facet name="header">Nome</f:facet>
                #{c.nome}
            </h:column>
            <h:column>
                <f:facet name="header">Email</f:facet>
                #{c.email}
            </h:column>
            <h:column>
                <f:facet name="header">Telefone</f:facet>
                #{c.telefone}
            </h:column>
            <h:column>
                <f:facet name="header">Acoes</f:facet>
                <h:link value="Editar" outcome="/content/clientes/editarCliente"
                        style="margin-right:8px;padding:4px 10px;background:#3498db;color:white;text-decoration:none;border-radius:4px;">
                    <f:param name="clienteId" value="#{c.id}"/>
                </h:link>
                <h:form style="display:inline;">
                    <h:commandButton value="Excluir" action="#{clienteBean.remover(c.id)}"
                                     onclick="return confirm('Confirma a exclusao de #{c.nome}?')"
                                     style="background:#e74c3c;color:white;border:none;padding:4px 10px;cursor:pointer;border-radius:4px;"/>
                </h:form>
            </h:column>
        </h:dataTable>

        <p rendered="#{empty clienteBean.clientes}" style="color:#999;">
            Nenhum cliente cadastrado ainda.
        </p>
    </ui:define>

</ui:composition>
