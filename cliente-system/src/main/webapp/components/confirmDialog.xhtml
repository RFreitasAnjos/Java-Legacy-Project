<ui:composition
    xmlns="http://www.w3.org/1999/xhtml"
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets"
    xmlns:p="http://primefaces.org/ui">

    <p:dialog
        id="#{dialogId}"
        header="#{titulo}"
        widgetVar="#{dialogId}"
        modal="true"
        closable="false"
        resizable="false"
        draggable="false"
        width="400">

        <div class="custom-modal-content">

            <div class="custom-modal-message">
                #{mensagem}
            </div>

            <div class="custom-modal-highlight">
                #{textoDestaque}
            </div>

        </div>

        <f:facet name="footer">

            <p:commandButton
                value="Confirmar"
                action="#{action}"
                update="#{update}"
                oncomplete="PF('#{dialogId}').hide()"
                styleClass="custom-btn-danger"/>

            <p:commandButton
                value="Cancelar"
                type="button"
                onclick="PF('#{dialogId}').hide()"
                styleClass="custom-btn-secondary"/>

        </f:facet>

    </p:dialog>

</ui:composition>
